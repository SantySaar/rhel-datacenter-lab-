---
# roles/haproxy/tasks/main.yml — RH358

- name: Install HAProxy
  ansible.builtin.dnf:
    name: haproxy
    state: present
  tags: haproxy

- name: Deploy HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: '0644'
    validate: 'haproxy -c -f %s'
  notify: restart haproxy
  tags: haproxy

- name: Open HAProxy ports in firewalld
  ansible.posix.firewalld:
    port: "{{ item }}"
    state: enabled
    permanent: true
    immediate: true
  loop:
    - "8080/tcp"
    - "8404/tcp"
  tags: haproxy, firewall

- name: Allow HAProxy stats port in SELinux
  community.general.seport:
    ports: 8404
    proto: tcp
    setype: http_port_t
    state: present
  tags: haproxy

- name: Enable and start HAProxy
  ansible.builtin.service:
    name: haproxy
    state: started
    enabled: true
  tags: haproxy
